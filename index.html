<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería de Animales</title>
  <link rel="stylesheet" href="estilo.css" />
</head>
<body>
  <main class="contenedor">
    <h1 class="titulo"><span>🐾</span> Galería de Animales</h1>

    <section class="grid-galeria">
      <article class="card grande">
        <div class="emoji">🦁</div>
        <h2>León</h2>
      </article>

      <article class="card mediana">
        <div class="emoji">🐺</div>
        <h2>Lobo</h2>
      </article>

      <article class="card mediana">
        <div class="emoji">🦊</div>
        <h2>Zorro</h2>
      </article>

      <article class="card chico">
        <div class="emoji">🐻</div>
        <h2>Oso</h2>
      </article>

      <article class="card chico">
        <div class="emoji">🦅</div>
        <h2>Águila</h2>
      </article>

      <article class="card chico">
        <div class="emoji">🐬</div>
        <h2>Delfín</h2>
      </article>
    </section>
  </main>
</body>
</html>
